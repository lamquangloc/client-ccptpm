server {
  listen 80;
  server_name _;

  # Proxy API calls to backend running on host port 5000.
  # host.docker.internal works on Docker Desktop (Windows/macOS).
  location /api/ {
    proxy_pass http://host.docker.internal:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy uploaded images/files from backend static route.
  location /uploads/ {
    proxy_pass http://host.docker.internal:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Root folder that contains built Vite assets
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any non-file route should return index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: cache static assets aggressively
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
